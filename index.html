<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registrar &amp; DNS Host Dashboard</title>
<style>
  :root {
    --bg: #0f1419; --panel: #1a2029; --panel2: #222b36; --line: #2e3945;
    --fg: #e6edf3; --muted: #8b98a5; --accent: #4c9aff; --accent2: #3fb950;
    --bar: #2d5a8c; --stick: 0px;
  }
  * { box-sizing: border-box; }
  /* Reserve the scrollbar gutter so the page never shifts sideways when the
     vertical scrollbar appears/disappears as the row count changes. */
  html { scrollbar-gutter: stable; }
  html, body { margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    /* Single scroll context: only the page scrolls, and its full height is
       reserved up front (spacer rows), so the scrollbar never jumps as rows
       virtualize in. No inner overflow:auto panes, so no nested scrollbar. */
  }
  header {
    padding: 18px 24px 14px;
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px 16px;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .meta { color: var(--muted); font-size: 12px; }

  .cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px; padding: 0 24px 18px; max-width: 1400px; margin: 0 auto;
  }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
  .card .n { font-size: 24px; font-weight: 700; }
  .card .l { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }

  /* Sticky tab bar — the only sticky chrome; column headers dock right beneath it. */
  .tabbar {
    position: sticky; top: 0; z-index: 20; background: var(--bg);
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px 16px; padding: 8px 24px;
  }
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab {
    background: transparent; color: var(--muted); border: 1px solid transparent;
    border-radius: 8px; padding: 7px 13px; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
  }
  .tab:hover { color: var(--fg); background: var(--panel); }
  .tab.active { color: var(--fg); background: var(--panel); border-color: var(--line); }
  /* Fixed min-width + tabular figures so a changing count (e.g. as the Top-N
     slider moves) never re-widens the badge and shoves the rest of the tab bar
     — including the slider — sideways. Sized to hold the largest value (50,000). */
  .badge { background: var(--panel2); color: var(--muted); border-radius: 20px; padding: 1px 8px; font-size: 11px; font-weight: 600;
    min-width: 52px; text-align: center; font-variant-numeric: tabular-nums; }
  .tab.active .badge { background: var(--accent); color: #04121f; }

  /* Applied-filter chips (replaces the old search box + TLD dropdown). */
  .filters { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; flex: 1 1 300px; min-width: 0; }
  .filters .hint { color: var(--muted); font-size: 12px; }
  .chip {
    display: inline-flex; align-items: center; gap: 7px; background: var(--panel2);
    border: 1px solid var(--line); border-radius: 20px; padding: 3px 4px 3px 10px; font-size: 12px; max-width: 100%;
  }
  .chip-type { text-transform: uppercase; letter-spacing: .03em; font-size: 10px; font-weight: 700; color: var(--muted); }
  .chip[data-type="tld"]       .chip-type { color: #6cb6ff; }
  .chip[data-type="registrar"] .chip-type { color: #7ee787; }
  .chip[data-type="dns"]       .chip-type { color: #e3b341; }
  .chip[data-type="domain"]    .chip-type { color: #ff9bce; }
  .chip-val { font-weight: 600; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip-x {
    border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 15px; line-height: 1;
    width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
  }
  .chip-x:hover { background: var(--line); color: var(--fg); }
  .clear-all { background: transparent; border: 0; color: var(--accent); cursor: pointer; font-size: 12px; padding: 2px 4px; }
  .clear-all:hover { text-decoration: underline; }

  /* Top-N control: limits every tab to the most popular N domains (by Tranco
     rank). Log-scaled slider for reach across 1..N, plus an exact number box. */
  .topn { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; color: var(--muted); font-size: 12px; }
  .topn > label { font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .topn input[type=range] { width: 150px; accent-color: var(--accent); cursor: pointer; }
  .topn input[type=number] {
    width: 76px; background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
    border-radius: 6px; padding: 4px 6px; font: inherit; font-variant-numeric: tabular-nums; text-align: right;
  }
  .topn input[type=number]:focus { outline: none; border-color: var(--accent); }
  .topn .topn-max { font-variant-numeric: tabular-nums; white-space: nowrap; }

  main { max-width: 1400px; margin: 0 auto; padding: 0 24px 40px; }
  .caption { font-size: 12px; padding: 12px 2px 8px; }

  table { border-collapse: collapse; width: 100%; font-size: 13px; table-layout: fixed; }
  th, td {
    text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--line);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  thead th {
    color: var(--muted); font-weight: 600; cursor: pointer; user-select: none;
    position: sticky; top: var(--stick); z-index: 10; background: var(--panel);
    box-shadow: 0 1px 0 var(--line);
  }
  th.sorted::after { content: " ▾"; color: var(--accent); }
  th.sorted.asc::after { content: " ▴"; }
  tbody tr:hover { background: var(--panel2); }
  tr.spacer, tr.spacer:hover { background: transparent; }
  tr.spacer td { padding: 0; border: 0; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .barcell { position: relative; }
  .bar { position: absolute; left: 0; top: 0; bottom: 0; background: var(--bar); opacity: .35; z-index: 0; }
  .barcell span { position: relative; z-index: 1; }
  /* Click-to-filter cells */
  a.f { color: inherit; text-decoration: none; cursor: pointer; }
  a.f:hover { color: var(--accent); text-decoration: underline; }
  .muted { color: var(--muted); }
  a.tag {
    display: inline-block; padding: 1px 7px; border-radius: 20px; background: var(--panel2);
    font-size: 11px; color: var(--muted); cursor: pointer; text-decoration: none;
  }
  a.tag:hover { color: var(--fg); background: var(--line); }
  #error { padding: 40px; text-align: center; color: #f0883e; }

  /* Row-hover info box (native HTML Popover API, shown on hover) — surfaces
     the raw, un-mapped registrar and nameservers behind the mapped values.
     Rendered in the top layer so it escapes the table's clipping/sticky
     stacking; pointer-events:none so it never steals the hover. */
  #rawPopover {
    position: fixed; margin: 0; inset: auto; pointer-events: none;
    width: max-content; max-width: min(440px, calc(100vw - 20px));
    max-height: calc(100vh - 20px); overflow: hidden;
    background: var(--panel); color: var(--fg);
    border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px 15px; box-shadow: 0 12px 34px rgba(0,0,0,.5);
  }
  #rawPopover h3 { margin: 0 0 2px; font-size: 15px; font-weight: 600; word-break: break-all; }
  #rawPopover .sub { color: var(--muted); font-size: 12px; margin-bottom: 13px; }
  #rawPopover dl { display: grid; grid-template-columns: max-content 1fr; gap: 11px 16px; margin: 0; align-items: start; }
  #rawPopover dt { color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; padding-top: 2px; }
  #rawPopover dd { margin: 0; word-break: break-word; }
  #rawPopover .map { color: var(--muted); font-size: 11px; margin-top: 3px; }
  #rawPopover ul.ns { list-style: none; margin: 0; padding: 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  #rawPopover ul.ns li { padding: 1px 0; }
</style>
</head>
<body>
<header>
  <h1>Registrar &amp; DNS Host Dashboard</h1>
  <div class="meta" id="meta">loading…</div>
</header>

<div class="cards" id="cards"></div>

<nav class="tabbar" id="tabbar">
  <div class="tabs">
    <button class="tab active" data-tab="domains">Domains <span class="badge" id="b-domains"></span></button>
    <button class="tab" data-tab="reg">By Registrar <span class="badge" id="b-reg"></span></button>
    <button class="tab" data-tab="dns">By DNS Host <span class="badge" id="b-dns"></span></button>
    <button class="tab" data-tab="tld">By TLD <span class="badge" id="b-tld"></span></button>
  </div>
  <div class="topn" id="topn" title="Limit every table to the most popular N domains">
    <label for="topnNum">Top</label>
    <input type="range" id="topnRange" min="0" max="1000" step="1" aria-label="Top N domains (slider)">
    <input type="number" id="topnNum" min="1" aria-label="Top N domains (exact)">
    <span class="topn-max muted" id="topnMax"></span>
  </div>
  <div class="filters" id="filters"></div>
</nav>

<main>
  <div id="error" style="display:none"></div>
  <div id="caption" class="caption muted"></div>
  <table id="mainTable"></table>
</main>

<div id="rawPopover" popover="manual"></div>

<script>
"use strict";

let DATA = [];
let byDomain = new Map();   // domain -> full record, for the raw-data popover
let hoverDomain = null;     // domain currently shown in the hover info box
let META = {};
let activeTab = "domains";
let filters = [];          // [{type:"domain|registrar|dns|tld", value}]
let maxRank = 0;           // highest Tranco rank in the dataset (the "all" ceiling)
let topN = 0;              // keep only domains ranked <= topN; set to maxRank on load

// virtual-scroll state for the currently shown table
let activeRows = [];
let activeRenderer = null;
let ncols = 5;
let rowH = 34;             // measured after first paint; ~uniform (single-line rows)
let winStart = -1, winEnd = -1;
let needMeasure = true;
const OVERSCAN = 8;

// Per-tab default sort. Single source of truth: `state` below is seeded from
// it, and the URL omits the sort param whenever a tab is at its default.
const DEFAULT_SORT = {
  domains: { key: "rank",  asc: true  },
  reg:     { key: "count", asc: false },
  dns:     { key: "count", asc: false },
  tld:     { key: "count", asc: false },
};
const SORT_STATE_KEY = { domains: "domSort", reg: "regSort", dns: "dnsSort", tld: "tldSort" };
// Columns each tab may sort by (guards against bogus ?sort= values in the URL).
const AGG_SORT_KEYS = ["_rank", "name", "count", "_share", "_cum"];
const SORT_KEYS = {
  domains: ["rank", "domain", "tld", "registrar", "dns_host"],
  reg: AGG_SORT_KEYS, dns: AGG_SORT_KEYS, tld: AGG_SORT_KEYS,
};
const state = {
  domSort: { ...DEFAULT_SORT.domains },
  regSort: { ...DEFAULT_SORT.reg },
  dnsSort: { ...DEFAULT_SORT.dns },
  tldSort: { ...DEFAULT_SORT.tld },
};
const ASC_KEYS = new Set(["name", "_rank", "rank", "domain", "tld", "registrar", "dns_host"]);
const FTYPE_LABEL = { domain: "Domain", registrar: "Registrar", dns: "DNS", tld: "TLD" };
const TABS = ["domains", "reg", "dns", "tld"];
const FILTER_TYPES = ["domain", "registrar", "dns", "tld"];

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

// A domain may delegate DNS to more than one provider (e.g. bing.com uses both
// NS1 (IBM) and Azure DNS). `dns_hosts` holds every provider; `dns_host` is kept
// as the dominant one for back-compat / sorting. Fall back to it for old data.
function dnsHostsOf(d) {
  return (d.dns_hosts && d.dns_hosts.length) ? d.dns_hosts : [d.dns_host || "Unknown"];
}

// The value(s) of a record along a filter dimension (matches the aggregate
// keys). Every dimension is multi-valued so the same code path handles the
// DNS case, where a domain can belong to several provider buckets at once.
function valuesFor(type, d) {
  return type === "domain" ? [d.domain]
    : type === "registrar" ? [d.registrar || "Unknown"]
    : type === "dns" ? dnsHostsOf(d)
    : [d.tld];
}

// ---- filtering: OR within a dimension, AND across dimensions -------------
// A record matches a dimension if ANY of its values for that dimension is in
// the filter set — so filtering by "Azure DNS" keeps bing.com even though its
// dominant provider is NS1 (IBM).
function filtered() {
  const cap = topN < maxRank;                    // false ⇒ "all", skip the rank test
  if (!filters.length && !cap) return DATA;
  const groups = new Map();
  for (const f of filters) {
    if (!groups.has(f.type)) groups.set(f.type, new Set());
    groups.get(f.type).add(f.value);
  }
  return DATA.filter(d => {
    if (cap && d.rank > topN) return false;
    for (const [type, vals] of groups)
      if (!valuesFor(type, d).some(v => vals.has(v))) return false;
    return true;
  });
}

// ---- aggregation & sorting ----------------------------------------------
// keysFn returns the list of buckets a row belongs to (usually one, but a
// multi-provider domain contributes to each of its DNS buckets).
function aggregate(rows, keysFn) {
  const m = new Map();
  for (const r of rows) {
    for (const raw of keysFn(r)) {
      const k = raw || "Unknown";
      m.set(k, (m.get(k) || 0) + 1);
    }
  }
  return [...m.entries()].map(([name, count]) => ({ name, count }));
}

function sortRows(rows, sort) {
  const { key, asc } = sort;
  const dir = asc ? 1 : -1;
  return rows.sort((a, b) => {
    let av = a[key], bv = b[key];
    if (typeof av === "string") { av = av.toLowerCase(); bv = (bv || "").toLowerCase(); }
    if (av < bv) return -1 * dir;
    if (av > bv) return 1 * dir;
    const at = (a.name || a.domain || "").toLowerCase(), bt = (b.name || b.domain || "").toLowerCase();
    return at < bt ? -1 : at > bt ? 1 : 0;
  });
}

function isUnknownName(n) { return /^unknown\b/i.test(String(n)); }

// Aggregate + attach stable popularity rank (#) and cumulative share.
// "Unknown" is excluded from rank and cumulative (but still listed, pinned to
// the bottom, with its true population share).
function computeAgg(keyFn, sort) {
  const rows = aggregate(filtered(), keyFn);
  const grandTotal = rows.reduce((s, r) => s + r.count, 0) || 1;
  const known = rows.filter(r => !isUnknownName(r.name));
  const unknown = rows.filter(r => isUnknownName(r.name));
  const knownTotal = known.reduce((s, r) => s + r.count, 0) || 1;
  const ranked = [...known].sort((a, b) =>
    b.count - a.count || (a.name.toLowerCase() < b.name.toLowerCase() ? -1 : 1));
  let run = 0;
  ranked.forEach((r, i) => { r._rank = i + 1; run += r.count; r._cum = 100 * run / knownTotal; });
  unknown.forEach(r => { r._rank = null; r._cum = null; });
  rows.forEach(r => { r._share = 100 * r.count / grandTotal; });
  sortRows(known, sort);
  return { display: known.concat(unknown), unique: rows.length, max: Math.max(1, ...rows.map(r => r.count)) };
}

// ---- table builders ------------------------------------------------------
function thCell(key, label, cls, sort) {
  return `<th data-key="${key}" class="${cls || ""} ${sort.key === key ? "sorted " + (sort.asc ? "asc" : "") : ""}">${label}</th>`;
}
function headHtml(cols, sort) {
  const colgroup = "<colgroup>" + cols.map(c => c[3] ? `<col style="width:${c[3]}">` : "<col>").join("") + "</colgroup>";
  return colgroup + "<thead><tr>" + cols.map(c => thCell(c[0], c[1], c[2], sort)).join("") + "</tr></thead>";
}
function fcell(type, value, cls) {
  return `<a class="${cls || "f"}" href="#" data-ft="${type}" data-fv="${esc(value)}">${esc(value)}</a>`;
}

function buildDomains() {
  const rows = sortRows(filtered(), state.domSort);
  const cols = [["rank", "Rank", "num", "70px"], ["domain", "Domain", ""], ["tld", "TLD", "", "88px"],
                ["registrar", "Registrar", ""], ["dns_host", "DNS Host", ""]];
  const renderer = d =>
    `<tr class="drow" data-domain="${esc(d.domain)}"><td class="num">${d.rank ?? ""}</td>` +
    `<td>${fcell("domain", d.domain)}</td>` +
    `<td>${fcell("tld", d.tld, "tag")}</td>` +
    `<td>${fcell("registrar", d.registrar || "Unknown")}</td>` +
    `<td>${dnsHostsOf(d).map(h => fcell("dns", h)).join('<span class="muted">, </span>')}</td></tr>`;
  return { head: headHtml(cols, state.domSort), cols, rows, renderer, count: rows.length, noun: "domains" };
}

function buildAgg(keyFn, label, sort, filterType) {
  const { display, unique, max } = computeAgg(keyFn, sort);
  const cols = [["_rank", "#", "num", "60px"], ["name", label, ""], ["count", "Count", "num", "150px"],
                ["_share", "Share", "num", "90px"], ["_cum", "Cumulative", "num", "120px"]];
  const renderer = r =>
    `<tr><td class="num muted">${r._rank ?? "—"}</td>` +
    `<td>${fcell(filterType, r.name)}</td>` +
    `<td class="num barcell"><div class="bar" style="width:${(100 * r.count / max).toFixed(1)}%"></div><span>${r.count.toLocaleString()}</span></td>` +
    `<td class="num">${r._share.toFixed(1)}%</td>` +
    `<td class="num">${r._cum == null ? "—" : r._cum.toFixed(1) + "%"}</td></tr>`;
  return { head: headHtml(cols, sort), cols, rows: display, renderer, count: unique, noun: "unique" };
}

// ---- render the active table (virtualized) -------------------------------
function activeSort() {
  return { domains: state.domSort, reg: state.regSort, dns: state.dnsSort, tld: state.tldSort }[activeTab];
}

function renderActive() {
  const b = activeTab === "domains" ? buildDomains()
    : activeTab === "reg" ? buildAgg(d => [d.registrar], "Registrar", state.regSort, "registrar")
    : activeTab === "dns" ? buildAgg(dnsHostsOf, "DNS Host", state.dnsSort, "dns")
    : buildAgg(d => [d.tld], "TLD", state.tldSort, "tld");

  hideRawPopover();          // the hovered row is about to be replaced
  activeRows = b.rows;
  activeRenderer = b.renderer;
  ncols = b.cols.length;
  document.getElementById("caption").textContent = `${b.count.toLocaleString()} ${b.noun}`;
  document.getElementById("mainTable").innerHTML = b.head + '<tbody id="mainTbody"></tbody>';

  window.scrollTo({ top: 0 });
  winStart = winEnd = -1;
  needMeasure = true;
  updateWindow(true);
}

// Render only the rows intersecting the viewport (± overscan). Reserved height =
// total * rowH is held constant via top/bottom spacer <tr>s, so the page height
// and scrollbar stay fixed regardless of scroll position.
function updateWindow(force) {
  const table = document.getElementById("mainTable");
  const tbody = document.getElementById("mainTbody");
  if (!tbody) return;
  const total = activeRows.length;
  const thead = table.tHead;
  const bodyTop = table.getBoundingClientRect().top + window.scrollY + (thead ? thead.offsetHeight : 0);

  let end = Math.min(total, Math.ceil((window.scrollY + window.innerHeight - bodyTop) / rowH) + OVERSCAN);
  let start = Math.max(0, Math.floor((window.scrollY - bodyTop) / rowH) - OVERSCAN);
  end = Math.max(0, end);
  start = Math.min(start, end);
  if (!force && start === winStart && end === winEnd) return;
  winStart = start; winEnd = end;

  let html = `<tr class="spacer" style="height:${start * rowH}px"><td colspan="${ncols}"></td></tr>`;
  for (let i = start; i < end; i++) html += activeRenderer(activeRows[i], i);
  html += `<tr class="spacer" style="height:${(total - end) * rowH}px"><td colspan="${ncols}"></td></tr>`;
  tbody.innerHTML = html;

  if (needMeasure && end > start) {
    needMeasure = false;
    const sample = tbody.querySelector("tr:not(.spacer)");
    const h = sample && sample.getBoundingClientRect().height;
    if (h > 4 && Math.abs(h - rowH) > 0.5) { rowH = h; updateWindow(true); }
  }
}

// ---- filter chips --------------------------------------------------------
function renderFilters() {
  const el = document.getElementById("filters");
  if (!filters.length) {
    el.innerHTML = '<span class="hint">Click any domain, registrar, DNS host, or TLD in the tables to add a filter.</span>';
    return;
  }
  let html = filters.map((f, i) =>
    `<span class="chip" data-type="${f.type}"><span class="chip-type">${FTYPE_LABEL[f.type]}</span>` +
    `<span class="chip-val">${esc(f.value)}</span>` +
    `<button class="chip-x" data-i="${i}" title="Remove filter" aria-label="Remove filter">×</button></span>`).join("");
  if (filters.length > 1) html += `<button class="clear-all" data-clear="1">Clear all</button>`;
  el.innerHTML = html;
}

function addFilter(type, value) {
  if (filters.some(f => f.type === type && f.value === value)) return;  // already applied
  filters.push({ type, value });
  pushUrl(false);
  refresh();
}

// ---- top-N control -------------------------------------------------------
// The slider is log-scaled so the useful low end (top 10 … top 1k) gets as much
// travel as the high end. The number box below the floor still works — it drives
// topN directly and just pins the slider to its minimum. Live updates re-render
// on rAF (setTopN) so dragging stays smooth; a single history entry is pushed on
// release (`change`), not on every intermediate `input`.
const TOPN_MIN = 10;       // slider floor (the number box can still go to 1)
const TOPN_STEPS = 1000;   // slider granularity
function topnPosToN(pos) {
  const t = Math.max(0, Math.min(1, pos / TOPN_STEPS));
  return Math.max(1, Math.min(maxRank, Math.round(TOPN_MIN * Math.pow(maxRank / TOPN_MIN, t))));
}
function topnNToPos(n) {
  n = Math.max(TOPN_MIN, Math.min(maxRank, n));
  return Math.round(TOPN_STEPS * Math.log(n / TOPN_MIN) / Math.log(maxRank / TOPN_MIN));
}

let topnRAF = 0;
function setTopN(n) {
  n = Math.max(1, Math.min(maxRank, Math.round(n)));
  if (n === topN) return;
  topN = n;
  if (topnRAF) return;                             // coalesce a burst of drag events
  topnRAF = requestAnimationFrame(() => { topnRAF = 0; refresh(); });
}

// Reflect the current topN onto both inputs (after URL load / back-forward).
function syncTopnControls() {
  const range = document.getElementById("topnRange");
  const num = document.getElementById("topnNum");
  if (range) { range.max = TOPN_STEPS; range.value = topnNToPos(topN); }
  if (num) { num.max = maxRank; num.value = topN; }
}

// ---- URL <-> state sync (shareable links + back/forward) -----------------
// The active tab, filters, and the active tab's column sort live in the query
// string, e.g. ?tab=reg&registrar=MarkMonitor&tld=com&sort=-_share
// Each filter dimension is its own repeatable param, which mirrors the filter
// model exactly (OR within a param, AND across params). Sort is encoded as
// `key` (ascending) or `-key` (descending), for the active tab only — that's
// the only table on screen. The default tab (domains), an empty filter set,
// and a tab sitting at its default sort are all omitted for tidy URLs.
function pushUrl(replace) {
  const p = new URLSearchParams();
  if (activeTab !== "domains") p.set("tab", activeTab);
  for (const f of filters) p.append(f.type, f.value);
  if (topN < maxRank) p.set("top", topN);         // omitted when showing all
  const sort = activeSort(), def = DEFAULT_SORT[activeTab];
  if (sort.key !== def.key || sort.asc !== def.asc) p.set("sort", (sort.asc ? "" : "-") + sort.key);
  const qs = p.toString();
  const url = location.pathname + (qs ? "?" + qs : "");
  history[replace ? "replaceState" : "pushState"](null, "", url);
}

function readUrl() {
  const p = new URLSearchParams(location.search);
  const tab = p.get("tab");
  activeTab = TABS.includes(tab) ? tab : "domains";
  filters = [];
  for (const type of FILTER_TYPES)
    for (const value of p.getAll(type))
      if (!filters.some(f => f.type === type && f.value === value))
        filters.push({ type, value });

  const top = parseInt(p.get("top"), 10);
  topN = (Number.isFinite(top) && top >= 1) ? Math.min(top, maxRank) : maxRank;

  // Apply the active tab's sort (or reset it to default when absent/invalid,
  // so the table always matches the URL after back/forward).
  const raw = p.get("sort") || "";
  const asc = raw[0] !== "-";
  const key = asc ? raw : raw.slice(1);
  const def = DEFAULT_SORT[activeTab];
  state[SORT_STATE_KEY[activeTab]] = SORT_KEYS[activeTab].includes(key) ? { key, asc } : { ...def };
}

function syncTabButtons() {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === activeTab));
}

// ---- summary cards + tab badges + full refresh --------------------------
function refresh() {
  renderFilters();
  setStick();               // chip rows can change the tab bar height
  const rows = filtered();
  const uniq = f => new Set(rows.map(f)).size;
  // Distinct values across a multi-valued dimension (DNS hosts can repeat per row).
  const uniqMulti = f => { const s = new Set(); for (const r of rows) for (const v of f(r)) s.add(v); return s.size; };
  const nDns = uniqMulti(dnsHostsOf);
  document.getElementById("cards").innerHTML = [
    [rows.length.toLocaleString(), "Domains"],
    [uniq(d => d.registrar), "Registrars"],
    [nDns, "DNS Hosts"],
    [uniq(d => d.tld), "TLDs"],
  ].map(([n, l]) => `<div class="card"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");

  document.getElementById("b-domains").textContent = rows.length.toLocaleString();
  document.getElementById("b-reg").textContent = uniq(d => d.registrar).toLocaleString();
  document.getElementById("b-dns").textContent = nDns.toLocaleString();
  document.getElementById("b-tld").textContent = uniq(d => d.tld).toLocaleString();
  renderActive();
}

// ---- interactions --------------------------------------------------------
function switchTab(tab) {
  if (tab === activeTab) return;
  activeTab = tab;
  syncTabButtons();
  pushUrl(false);
  renderActive();
}

// ---- raw-data hover info box (native HTML Popover API) -------------------
// Hovering a domain row shows its un-mapped source data (registrar_raw, IANA
// id, nameservers) alongside the mapped values displayed in the table.
function showRawPopover(row, clientX) {
  const d = byDomain.get(row.dataset.domain);
  if (!d || d.domain === hoverDomain) return;   // nothing to do / already shown
  hoverDomain = d.domain;
  const pop = document.getElementById("rawPopover");
  const ns = (d.nameservers && d.nameservers.length)
    ? `<ul class="ns">${d.nameservers.map(n => `<li>${esc(n)}</li>`).join("")}</ul>`
    : `<span class="muted">—</span>`;
  pop.innerHTML =
    `<h3>${esc(d.domain)}</h3>` +
    `<div class="sub">Rank #${esc(d.rank)} · .${esc(d.tld)}</div>` +
    `<dl>` +
      `<dt>Registrar</dt><dd>${esc(d.registrar_raw || "Unknown")}` +
        (d.registrar ? `<div class="map">mapped → ${esc(d.registrar)}</div>` : "") + `</dd>` +
      `<dt>IANA ID</dt><dd>${d.iana_id ? esc(d.iana_id) : '<span class="muted">—</span>'}</dd>` +
      `<dt>Nameservers</dt><dd>${ns}` +
        `<div class="map">mapped → ${esc(dnsHostsOf(d).join(", "))}</div></dd>` +
    `</dl>`;

  // Show (once), then anchor below the row near the cursor and clamp/flip
  // into the viewport (8px margin).
  if (!pop.matches(":popover-open")) pop.showPopover();
  const m = 8;
  const rect = row.getBoundingClientRect();
  const pr = pop.getBoundingClientRect();
  let left = Math.max(m, Math.min(clientX + 12, window.innerWidth - pr.width - m));
  let top = rect.bottom + 6;
  if (top + pr.height + m > window.innerHeight) top = rect.top - pr.height - 6;
  top = Math.max(m, top);
  pop.style.left = left + "px";
  pop.style.top = top + "px";
}

function hideRawPopover() {
  hoverDomain = null;
  const pop = document.getElementById("rawPopover");
  if (pop.matches(":popover-open")) pop.hidePopover();
}

function setStick() {
  document.documentElement.style.setProperty("--stick", document.getElementById("tabbar").offsetHeight + "px");
}

function initControls() {
  document.querySelectorAll(".tab").forEach(b => b.onclick = () => switchTab(b.dataset.tab));

  // top-N slider (log-scaled) + exact number box, kept in sync with each other.
  const topnRange = document.getElementById("topnRange");
  const topnNum = document.getElementById("topnNum");
  topnRange.addEventListener("input", () => { setTopN(topnPosToN(+topnRange.value)); topnNum.value = topN; });
  topnRange.addEventListener("change", () => pushUrl(false));   // one history entry per drag
  topnNum.addEventListener("input", () => {
    const v = parseInt(topnNum.value, 10);
    if (!Number.isFinite(v)) return;                            // mid-edit / empty: wait
    setTopN(v);
    topnRange.value = topnNToPos(topN);
  });
  topnNum.addEventListener("change", () => {
    const v = parseInt(topnNum.value, 10);
    setTopN(Number.isFinite(v) && v >= 1 ? v : maxRank);        // blank/invalid ⇒ reset to all
    syncTopnControls();
    pushUrl(false);
  });

  // filter chips: remove one / clear all
  document.getElementById("filters").addEventListener("click", e => {
    const x = e.target.closest(".chip-x");
    if (x) { filters.splice(+x.dataset.i, 1); pushUrl(false); refresh(); return; }
    if (e.target.closest("[data-clear]")) { filters = []; pushUrl(false); refresh(); }
  });

  // Back/forward: re-hydrate tab + filters from the URL and re-render. No
  // pushUrl here — popstate is the browser already moving through history.
  window.addEventListener("popstate", () => {
    readUrl();
    syncTabButtons();
    syncTopnControls();
    refresh();
  });

  // table: header sorting + click-a-cell-to-filter (delegated, survives re-renders)
  document.getElementById("mainTable").addEventListener("click", e => {
    const a = e.target.closest("a[data-ft]");
    if (a) { e.preventDefault(); addFilter(a.dataset.ft, a.dataset.fv); return; }
    const th = e.target.closest("th[data-key]");
    if (th) {
      const sort = activeSort(), key = th.dataset.key;
      if (sort.key === key) sort.asc = !sort.asc;
      else { sort.key = key; sort.asc = ASC_KEYS.has(key); }
      pushUrl(false);
      renderActive();
    }
  });

  // Hovering a domain row shows its raw source data in the info box; moving
  // off any data row (onto the header, a gap, or out of the table) hides it.
  const tbl = document.getElementById("mainTable");
  tbl.addEventListener("mouseover", e => {
    const row = e.target.closest("tr[data-domain]");
    if (row) showRawPopover(row, e.clientX);
    else hideRawPopover();
  });
  tbl.addEventListener("mouseleave", hideRawPopover);

  let af = 0;
  window.addEventListener("scroll", () => { hideRawPopover(); if (!af) af = requestAnimationFrame(() => { af = 0; updateWindow(false); }); }, { passive: true });
  window.addEventListener("resize", () => { setStick(); updateWindow(true); });
  setStick();
}

fetch("data.json", { cache: "no-store" })
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status + " loading data.json"); return r.json(); })
  .then(j => {
    META = j; DATA = j.domains || [];
    byDomain = new Map(DATA.map(d => [d.domain, d]));
    maxRank = DATA.reduce((m, d) => d.rank > m ? d.rank : m, 0) || DATA.length;
    topN = maxRank;     // default: show all (readUrl may narrow it from ?top=)
    document.getElementById("topnMax").textContent = "of " + maxRank.toLocaleString();
    const gen = j.generated ? new Date(j.generated).toLocaleString() : "?";
    document.getElementById("meta").textContent =
      `${DATA.length.toLocaleString()} domains · top ${(j.limit || DATA.length).toLocaleString()} of Tranco · generated ${gen}`;
    readUrl();          // hydrate tab + filters + top-N from the URL (shareable links)
    initControls();
    syncTabButtons();   // reflect the active tab on the buttons
    syncTopnControls(); // reflect the active top-N on the slider + number box
    pushUrl(true);      // canonicalize the URL (drop unknown/duplicate params)
    refresh();
  })
  .catch(err => {
    document.getElementById("error").style.display = "block";
    document.getElementById("error").textContent =
      "Could not load data.json — " + err.message +
      ". Serve this folder over HTTP (e.g. `python3 -m http.server`) so the browser can fetch the JSON.";
    document.getElementById("meta").textContent = "error";
  });
</script>
</body>
</html>
