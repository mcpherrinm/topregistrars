<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registrar &amp; DNS Host Dashboard</title>
<style>
  :root {
    --bg: #0f1419; --panel: #1a2029; --panel2: #222b36; --line: #2e3945;
    --fg: #e6edf3; --muted: #8b98a5; --accent: #4c9aff; --accent2: #3fb950;
    --bar: #2d5a8c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    padding: 20px 24px; border-bottom: 1px solid var(--line);
    display: flex; flex-wrap: wrap; align-items: center; gap: 16px 24px;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .meta { color: var(--muted); font-size: 12px; }
  .controls { margin-left: auto; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  select, input[type=search] {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
    border-radius: 6px; padding: 7px 10px; font-size: 13px;
  }
  main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 16px; }
  .card .n { font-size: 26px; font-weight: 700; }
  .card .l { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; margin-top: 4px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  section.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  section.panel > h2 {
    font-size: 14px; margin: 0; padding: 12px 16px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px; font-weight: 600;
  }
  section.panel > h2 .count { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; cursor: pointer; user-select: none; position: sticky; top: 0; background: var(--panel); }
  th.sorted::after { content: " ▾"; color: var(--accent); }
  th.sorted.asc::after { content: " ▴"; }
  tbody tr:hover { background: var(--panel2); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .barcell { position: relative; min-width: 120px; }
  .bar { position: absolute; left: 0; top: 0; bottom: 0; background: var(--bar); opacity: .35; z-index: 0; }
  .barcell span { position: relative; z-index: 1; }
  .scroll { max-height: 520px; overflow: auto; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .muted { color: var(--muted); }
  .pager { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-top: 1px solid var(--line); font-size: 13px; }
  .pager button {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
    border-radius: 6px; padding: 5px 12px; cursor: pointer;
  }
  .pager button:disabled { opacity: .4; cursor: default; }
  .tag { display: inline-block; padding: 1px 7px; border-radius: 20px; background: var(--panel2); font-size: 11px; color: var(--muted); }
  #error { padding: 40px; text-align: center; color: #f0883e; }
  .fullwidth { grid-column: 1 / -1; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Registrar &amp; DNS Host Dashboard</h1>
    <div class="meta" id="meta">loading…</div>
  </div>
  <div class="controls">
    <label>TLD:
      <select id="tldFilter"><option value="__all__">All TLDs</option></select>
    </label>
    <input type="search" id="search" placeholder="Search domain / registrar / DNS…" style="width: 260px">
  </div>
</header>

<main>
  <div id="error" style="display:none"></div>
  <div class="cards" id="cards"></div>

  <div class="grid">
    <section class="panel">
      <h2>By Registrar <span class="count" id="regCount"></span></h2>
      <div class="scroll"><table id="regTable"></table></div>
    </section>
    <section class="panel">
      <h2>By DNS Host <span class="count" id="dnsCount"></span></h2>
      <div class="scroll"><table id="dnsTable"></table></div>
    </section>
    <section class="panel fullwidth">
      <h2>By TLD <span class="count" id="tldCount"></span></h2>
      <div class="scroll"><table id="tldTable"></table></div>
    </section>
  </div>

  <section class="panel">
    <h2>Domains <span class="count" id="domCount"></span></h2>
    <div class="scroll"><table id="domTable"></table></div>
    <div class="pager">
      <button id="prev">‹ Prev</button>
      <span id="pageInfo" class="muted"></span>
      <button id="next">Next ›</button>
      <span style="margin-left:auto" class="muted">rows per page:</span>
      <select id="pageSize">
        <option>50</option><option selected>100</option><option>250</option><option>500</option>
      </select>
    </div>
  </section>
</main>

<script>
"use strict";

let DATA = [];          // all domain records
let META = {};
const state = {
  tld: "__all__",
  q: "",
  page: 0,
  pageSize: 100,
  domSort: { key: "rank", asc: true },
  regSort: { key: "count", asc: false },
  dnsSort: { key: "count", asc: false },
  tldSort: { key: "count", asc: false },
};

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

// ---- filtering -----------------------------------------------------------
function filtered() {
  const q = state.q.trim().toLowerCase();
  return DATA.filter(d => {
    if (state.tld !== "__all__" && d.tld !== state.tld) return false;
    if (q) {
      const hay = (d.domain + " " + (d.registrar || "") + " " + (d.dns_host || "")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

// ---- aggregation ---------------------------------------------------------
function aggregate(rows, keyFn) {
  const m = new Map();
  for (const r of rows) {
    const k = keyFn(r) || "Unknown";
    m.set(k, (m.get(k) || 0) + 1);
  }
  return [...m.entries()].map(([name, count]) => ({ name, count }));
}

function sortRows(rows, sort) {
  const { key, asc } = sort;
  const dir = asc ? 1 : -1;
  return rows.sort((a, b) => {
    let av = a[key], bv = b[key];
    if (typeof av === "string") { av = av.toLowerCase(); bv = (bv || "").toLowerCase(); }
    if (av < bv) return -1 * dir;
    if (av > bv) return 1 * dir;
    // tiebreak by name/domain
    const at = (a.name || a.domain || "").toLowerCase(), bt = (b.name || b.domain || "").toLowerCase();
    return at < bt ? -1 : at > bt ? 1 : 0;
  });
}

// ---- rendering: aggregation tables --------------------------------------
function renderAgg(tableId, rows, sort, label, onSortChange, clickFilter) {
  sortRows(rows, sort);
  const total = rows.reduce((s, r) => s + r.count, 0);
  const max = rows.reduce((m, r) => Math.max(m, r.count), 0) || 1;
  const th = (key, txt, cls) =>
    `<th data-key="${key}" class="${cls || ""} ${sort.key === key ? "sorted " + (sort.asc ? "asc" : "") : ""}">${txt}</th>`;
  let html = "<thead><tr>" +
    th("name", label) + th("count", "Count", "num") + th("count", "Share", "num") +
    "</tr></thead><tbody>";
  for (const r of rows) {
    const pct = total ? (100 * r.count / total) : 0;
    const w = (100 * r.count / max).toFixed(1);
    html += `<tr>` +
      `<td>${clickFilter ? `<a href="#" data-fval="${esc(r.name)}">${esc(r.name)}</a>` : esc(r.name)}</td>` +
      `<td class="num barcell"><div class="bar" style="width:${w}%"></div><span>${r.count.toLocaleString()}</span></td>` +
      `<td class="num">${pct.toFixed(1)}%</td></tr>`;
  }
  html += "</tbody>";
  const el = document.getElementById(tableId);
  el.innerHTML = html;
  el.querySelectorAll("th").forEach(th =>
    th.onclick = () => {
      const key = th.dataset.key;
      if (sort.key === key) sort.asc = !sort.asc;
      else { sort.key = key; sort.asc = key === "name"; }
      onSortChange();
    });
  if (clickFilter) {
    el.querySelectorAll("a[data-fval]").forEach(a =>
      a.onclick = e => { e.preventDefault(); clickFilter(a.dataset.fval); });
  }
  return rows.length;
}

// ---- rendering: domains table -------------------------------------------
function renderDomains(rows) {
  sortRows(rows, state.domSort);
  const size = state.pageSize;
  const pages = Math.max(1, Math.ceil(rows.length / size));
  if (state.page >= pages) state.page = pages - 1;
  if (state.page < 0) state.page = 0;
  const start = state.page * size;
  const slice = rows.slice(start, start + size);

  const cols = [
    ["rank", "Rank", "num"], ["domain", "Domain", ""], ["tld", "TLD", ""],
    ["registrar", "Registrar", ""], ["dns_host", "DNS Host", ""],
  ];
  const s = state.domSort;
  let html = "<thead><tr>" + cols.map(([k, t, cls]) =>
    `<th data-key="${k}" class="${cls} ${s.key === k ? "sorted " + (s.asc ? "asc" : "") : ""}">${t}</th>`).join("") +
    "</tr></thead><tbody>";
  for (const d of slice) {
    html += `<tr>` +
      `<td class="num">${d.rank ?? ""}</td>` +
      `<td><a href="https://${esc(d.domain)}" target="_blank" rel="noopener">${esc(d.domain)}</a></td>` +
      `<td><span class="tag">${esc(d.tld)}</span></td>` +
      `<td>${esc(d.registrar)}</td>` +
      `<td>${esc(d.dns_host)}</td></tr>`;
  }
  html += "</tbody>";
  const el = document.getElementById("domTable");
  el.innerHTML = html;
  el.querySelectorAll("th").forEach(th =>
    th.onclick = () => {
      const key = th.dataset.key;
      if (s.key === key) s.asc = !s.asc;
      else { s.key = key; s.asc = true; }
      renderDomains(filtered());
    });

  document.getElementById("domCount").textContent = rows.length.toLocaleString() + " domains";
  document.getElementById("pageInfo").textContent =
    `page ${state.page + 1} / ${pages}  ·  showing ${slice.length ? start + 1 : 0}–${start + slice.length}`;
  document.getElementById("prev").disabled = state.page <= 0;
  document.getElementById("next").disabled = state.page >= pages - 1;
}

// ---- master render -------------------------------------------------------
function renderAll() {
  const rows = filtered();

  // cards
  const uniq = (f) => new Set(rows.map(f)).size;
  document.getElementById("cards").innerHTML = [
    [rows.length.toLocaleString(), "Domains"],
    [uniq(d => d.registrar), "Registrars"],
    [uniq(d => d.dns_host), "DNS Hosts"],
    [uniq(d => d.tld), "TLDs"],
  ].map(([n, l]) => `<div class="card"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");

  const nReg = renderAgg("regTable", aggregate(rows, d => d.registrar), state.regSort, "Registrar",
    () => document.getElementById("regCount").textContent =
      renderAgg("regTable", aggregate(rows, d => d.registrar), state.regSort, "Registrar", () => {}, filterByRegistrar) + " unique",
    filterByRegistrar);
  document.getElementById("regCount").textContent = nReg + " unique";

  const nDns = renderAgg("dnsTable", aggregate(rows, d => d.dns_host), state.dnsSort, "DNS Host",
    () => document.getElementById("dnsCount").textContent =
      renderAgg("dnsTable", aggregate(rows, d => d.dns_host), state.dnsSort, "DNS Host", () => {}, filterByDns) + " unique",
    filterByDns);
  document.getElementById("dnsCount").textContent = nDns + " unique";

  const nTld = renderAgg("tldTable", aggregate(rows, d => d.tld), state.tldSort, "TLD",
    () => document.getElementById("tldCount").textContent =
      renderAgg("tldTable", aggregate(rows, d => d.tld), state.tldSort, "TLD", () => {}, selectTld) + " unique",
    selectTld);
  document.getElementById("tldCount").textContent = nTld + " unique";

  renderDomains(rows);
}

// ---- filter helpers (clicking rows) -------------------------------------
function filterByRegistrar(v) { document.getElementById("search").value = v; state.q = v; state.page = 0; renderAll(); }
function filterByDns(v) { document.getElementById("search").value = v; state.q = v; state.page = 0; renderAll(); }
function selectTld(v) { document.getElementById("tldFilter").value = v; state.tld = v; state.page = 0; renderAll(); }

// ---- init ----------------------------------------------------------------
function initControls() {
  // TLD dropdown, ordered by frequency
  const counts = aggregate(DATA, d => d.tld).sort((a, b) => b.count - a.count);
  const sel = document.getElementById("tldFilter");
  for (const { name, count } of counts) {
    const o = document.createElement("option");
    o.value = name; o.textContent = `.${name} (${count.toLocaleString()})`;
    sel.appendChild(o);
  }
  sel.onchange = () => { state.tld = sel.value; state.page = 0; renderAll(); };

  let t;
  const search = document.getElementById("search");
  search.oninput = () => { clearTimeout(t); t = setTimeout(() => { state.q = search.value; state.page = 0; renderAll(); }, 150); };

  document.getElementById("prev").onclick = () => { state.page--; renderDomains(filtered()); };
  document.getElementById("next").onclick = () => { state.page++; renderDomains(filtered()); };
  document.getElementById("pageSize").onchange = e => { state.pageSize = +e.target.value; state.page = 0; renderDomains(filtered()); };
}

fetch("data.json", { cache: "no-store" })
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status + " loading data.json"); return r.json(); })
  .then(j => {
    META = j; DATA = j.domains || [];
    const gen = j.generated ? new Date(j.generated).toLocaleString() : "?";
    document.getElementById("meta").innerHTML =
      `${DATA.length.toLocaleString()} domains · top ${(j.limit || DATA.length).toLocaleString()} of Tranco · generated ${esc(gen)}`;
    initControls();
    renderAll();
  })
  .catch(err => {
    document.getElementById("error").style.display = "block";
    document.getElementById("error").textContent =
      "Could not load data.json — " + err.message +
      ". Serve this folder over HTTP (e.g. `python3 -m http.server`) so the browser can fetch the JSON.";
    document.getElementById("meta").textContent = "error";
  });
</script>
</body>
</html>
